  - name: "google-chrome"
    format: "apt"
    storage:
      blobStoreName: "google"
    apt:
      distribution: "stable"
    proxy:
      remoteUrl: "http://dl.google.com/linux/chrome/deb"
    tag: "chrome"

  - name: "ubuntu-microsoft-vscode"
    format: "apt"
    storage:
      blobStoreName: "microsoft-vscode"
    apt:
      distribution: "stable"
    proxy:
      remoteUrl: "https://packages.microsoft.com/repos/vscode"
    tag: "vscode"